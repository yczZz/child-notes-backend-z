server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: ${MYSQL_TEST_URL:jdbc:mysql://127.0.0.1:3306/child_notes_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
      username: ${MYSQL_TEST_USER:root}
      password: ${MYSQL_TEST_PWD:}
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  application:
    name: child-notes-backend
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

wechat:
  mini-app:
    app-id: ${WECHAT_APPID:}
    app-secret: ${WECHAT_SECRET:}

jwt:
  secret: ${JWT_SECRET:change-this-jwt-secret-before-deploy}
  expire-days: ${JWT_EXPIRE_DAYS:30}

admin:
  init-username: ${ADMIN_INIT_USERNAME:admin}
  init-password: ${ADMIN_INIT_PASSWORD:}
  init-display-name: ${ADMIN_INIT_DISPLAY_NAME:Administrator}
  token-expire-hours: ${ADMIN_TOKEN_EXPIRE_HOURS:12}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  max-requests-per-second: ${RATE_LIMIT_MAX_REQUESTS_PER_SECOND:5}
  blacklist-requests-per-second: ${RATE_LIMIT_BLACKLIST_REQUESTS_PER_SECOND:10}
  trust-proxy-headers: ${RATE_LIMIT_TRUST_PROXY_HEADERS:true}

deepseek:
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  temperature: ${DEEPSEEK_TEMPERATURE:0.3}
  max-tokens: ${DEEPSEEK_MAX_TOKENS:2500}
  thinking-enabled: ${DEEPSEEK_THINKING_ENABLED:false}
  reasoning-effort: ${DEEPSEEK_REASONING_EFFORT:high}

baby-analysis:
  agent:
    name: ${BABY_ANALYSIS_AGENT_NAME:baby-analysis-agent}
    description: ${BABY_ANALYSIS_AGENT_DESCRIPTION:Baby feeding and growth analysis agent}
    workspace: ${BABY_ANALYSIS_AGENT_WORKSPACE:.agentscope/baby-analysis}
    session-prefix: ${BABY_ANALYSIS_AGENT_SESSION_PREFIX:baby-analysis}
    max-iters: ${BABY_ANALYSIS_AGENT_MAX_ITERS:1}
    timeout-seconds: ${BABY_ANALYSIS_AGENT_TIMEOUT_SECONDS:120}

oss:
  endpoint: ${OSS_ENDPOINT:}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET_NAME:}
  base-url: ${OSS_BASE_URL:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
